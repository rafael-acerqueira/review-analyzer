name: Frontend CI

on:
  push:
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: review_analyzer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: review_analyzer_test
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/review_analyzer_test
      API_URL: http://localhost:8000
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: test-secret
      SECRET_KEY: test-secret
      INTERNAL_AUTH_SECRET: test-secret
      GOOGLE_CLIENT_ID: test-google-client-id
      GOOGLE_CLIENT_SECRET: test-google-client-secret

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Install wait-on globally
        run: npm install -g wait-on

      - name: Check API_URL before build
        working-directory: frontend
        run: |
          echo "API_URL before build is: $API_URL"

      - name: Build Next.js app
        working-directory: frontend
        run: npm run build

      - name: Install uv & Python 3.10
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.10'
          enable-cache: true

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --locked

      - name: Wait for PostgreSQL to be ready
        run: |
          until pg_isready -h localhost -p 5432; do
            echo "Waiting for postgres..."
            sleep 1
          done

      - name: Run Alembic migrations
        working-directory: backend
        run: uv run alembic upgrade head

      - name: Start FastAPI backend
        working-directory: backend
        run: uv run python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level debug > uvicorn.log 2>&1 &

      - name: Wait for FastAPI backend to be ready
        run: wait-on tcp:127.0.0.1:8000 --timeout 60000

      - name: Show environment DATABASE_URL
        run: |
          echo "$DATABASE_URL"

      - name: Print API_URL used by Next.js
        run: |
          echo "$API_URL"

      - name: Test backend accessibility from runner
        run: |
          curl -v http://localhost:8000/docs || curl -v http://127.0.0.1:8000/docs

      - name: Print FastAPI env
        working-directory: backend
        run: |
          uv run python -c "import os; print('DATABASE_URL:', os.getenv('DATABASE_URL')); print('API_URL:', os.getenv('API_URL'))"

      - name: Start Next.js app
        working-directory: frontend
        run: npm start &

      - name: Wait for Next.js to be ready
        run: wait-on http://localhost:3000 --timeout 60000

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test

      - name: Upload Playwright screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: frontend/test-results/

      - name: Upload FastAPI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uvicorn-log
          path: backend/uvicorn.log

      - name: Prune uv cache
        if: always()
        run: uv cache prune --ci
